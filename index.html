<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IVC – Testbook Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF5B2E;--navy:#0F1F38;--bg:#F5F3EF;
  --r:20px;--font:'Sora',sans-serif;--serif:'DM Serif Display',serif;
}
html,body{
  height:100%;width:100%;
  font-family:var(--font);
  background:var(--bg);
  color:var(--navy);
  overflow:hidden;
}

/* ── FULL PAGE LAYOUT ── */
.page{
  height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:0;
}

/* ── HEADER ── */
.header{
  width:100%;max-width:420px;
  padding:14px 20px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #E8E4DC;
  flex-shrink:0;background:var(--bg);
}
.brand{display:flex;align-items:center;gap:8px}
.brand img{height:22px;object-fit:contain}
.brand-label{font-size:13px;font-weight:600;color:var(--navy);opacity:.65}


/* ── PROGRESS ── */
.progress-wrap{
  width:100%;max-width:420px;
  padding:10px 20px 4px;flex-shrink:0;
}
.pb-bg{height:3px;background:#E0DDD6;border-radius:2px;overflow:hidden}
.pb-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .35s ease}
.pb-text{font-size:12px;color:#aaa;text-align:right;margin-top:5px;font-weight:500}

/* ── ARENA ── */
.arena{
  flex:1;
  width:100%;max-width:420px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  padding:12px 16px;
  min-height:0;
}

/* ── BEHIND CARDS ── */
.card-behind{
  position:absolute;
  width:calc(100% - 32px);max-width:388px;
  background:#fff;border-radius:var(--r);
  border:1px solid #E8E4DC;
  height:calc(100% - 24px);
}
.cb2{transform:scale(.94) translateY(16px);z-index:1;}
.cb1{transform:scale(.97) translateY(8px);z-index:2;}

/* ── SWIPE CARD ── */
.swipe-card{
  position:absolute;z-index:10;
  width:calc(100% - 32px);max-width:388px;
  height:calc(100% - 24px);
  border-radius:var(--r);
  background:#fff;border:1px solid #E8E4DC;
  cursor:grab;user-select:none;
  overflow:hidden;will-change:transform;
  touch-action:none;
  display:flex;flex-direction:column;
}
.swipe-card:active{cursor:grabbing}

/* ── CARD INTERNALS ── */
.c-stripe{height:5px;width:100%;flex-shrink:0}
.c-body{
  padding:14px 18px 16px;
  flex:1;display:flex;flex-direction:column;gap:12px;
  min-height:0;
}
.c-top{display:flex;align-items:flex-start;justify-content:space-between}
.c-tag{
  font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;
}
.c-meta{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.c-logo{height:18px;object-fit:contain;opacity:.75}
.c-num{font-size:11px;color:#bbb;font-weight:600}
.c-title{font-family:var(--serif);font-size:20px;color:var(--navy);line-height:1.25}
.c-sub{font-size:12px;color:#999;margin-top:-4px}
.c-points{list-style:none;display:flex;flex-direction:column;gap:9px;}
.c-points li{
  display:flex;align-items:flex-start;gap:8px;
  font-size:12.5px;color:#374151;line-height:1.45;
}
.pdot{
  width:17px;height:17px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;margin-top:1px;
}
.c-fact{
  margin-top:auto;flex-shrink:0;
  border-radius:10px;padding:10px 12px;
  font-size:12px;line-height:1.5;
}
.c-fact strong{display:block;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:2px}

/* ── SWIPE OVERLAYS ── */
.ov-l,.ov-r{
  position:absolute;inset:0;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;z-index:20;
}
.ov-l{background:rgba(239,68,68,.1)}
.ov-r{background:rgba(34,197,94,.1)}
.ov-label{
  padding:9px 20px;border-radius:50px;
  font-size:20px;font-weight:700;border:3px solid;
}
.ov-l .ov-label{border-color:#ef4444;color:#ef4444;transform:rotate(15deg)}
.ov-r .ov-label{border-color:#22c55e;color:#22c55e;transform:rotate(-15deg)}

/* ── BUTTONS ── */
.hint{font-size:11px;color:#bbb;text-align:center;padding:4px 0;flex-shrink:0}
.btn-row{
  display:flex;align-items:center;justify-content:center;
  gap:18px;padding:10px 20px 14px;
  width:100%;max-width:420px;flex-shrink:0;
}

.btn-got{
  padding:0 24px;height:46px;border-radius:50px;border:none;cursor:pointer;
  background:var(--orange);color:#fff;font-size:13px;font-weight:600;
  font-family:var(--font);box-shadow:0 2px 12px rgba(255,91,46,.3);
  transition:transform .15s,background .15s;
}
.btn-got:hover{background:#e04a1f;transform:translateY(-1px)}

/* ── DONE ── */
.done{
  display:none;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  padding:40px 32px;gap:14px;
  width:100%;max-width:420px;flex:1;
}
.done.show{display:flex}
.done-emoji{font-size:52px}
.done-title{font-family:var(--serif);font-size:24px;color:var(--navy)}
.done-sub{font-size:13px;color:#888;max-width:240px}
.done-btn{
  padding:11px 26px;border-radius:50px;
  border:none;font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  transition:opacity .15s;text-decoration:none;display:inline-block;
}

/* ── EXIT ANIMS ── */
.exit-l{animation:goLeft .32s ease forwards}
.exit-r{animation:goRight .32s ease forwards}
@keyframes goLeft{to{transform:translateX(-140%) rotate(-28deg);opacity:0}}
@keyframes goRight{to{transform:translateX(140%) rotate(28deg);opacity:0}}

/* ── DESKTOP ── */
@media(min-width:600px){
  .page{background:#E8E4DC;justify-content:center}
  .header,.progress-wrap,.arena,.btn-row,.hint{
    background:#F5F3EF;
  }
  .header{border-radius:20px 20px 0 0;border:1px solid #DDD;border-bottom:1px solid #E8E4DC}
  .progress-wrap{border-left:1px solid #DDD;border-right:1px solid #DDD}
  .arena{border-left:1px solid #DDD;border-right:1px solid #DDD}
  .hint{border-left:1px solid #DDD;border-right:1px solid #DDD}
  .btn-row{border-radius:0 0 20px 20px;border:1px solid #DDD;border-top:1px solid #E8E4DC}
  .dk-hint{display:block}
}
.dk-hint{display:none;font-size:11px;color:#bbb;text-align:center;padding:2px 0;flex-shrink:0;width:100%;max-width:420px}
</style>
</head>

</div>

let idx=0,dragging=false,startX=0,curX=0,card=null;
const THRESH=75;

function mkCard(i){
  if(i>=DATA.length)return null;
  const d=DATA[i],el=document.createElement('div');
  el.className='swipe-card';
  el.innerHTML=`
    <div class="c-stripe" style="background:${d.stripe}"></div>
    <div class="c-body">
      <div class="c-top">
        <span class="c-tag" style="background:${d.tBg};color:${d.tClr}">${d.tag}</span>
        <div class="c-meta">
          <img class="c-logo" src="https://cdn.testbook.com/resources/productionimages/Nirnay%20LOGO_All_1755832743.png" alt="">
          <span class="c-num">${i+1} / ${DATA.length}</span>
        </div>
      </div>
      <div><p class="c-title">${d.title}</p><p class="c-sub">${d.sub}</p></div>
      <ul class="c-points">${d.pts.map(p=>`<li><span class="pdot" style="background:${d.pBg};color:${d.pClr}">✦</span><span>${p}</span></li>`).join('')}</ul>
      <div class="c-fact" style="background:${d.fBg};color:${d.fClr}">
        <strong style="color:${d.tClr}">${d.fLbl}</strong>${d.fact}
      </div>
    </div>
    <div class="ov-l"><span class="ov-label">SKIP</span></div>
    <div class="ov-r"><span class="ov-label">GOT IT</span></div>`;
  return el;
}

function render(){
  const arena=document.getElementById('arena');
  const old=arena.querySelector('.swipe-card');
  if(old)old.remove();

  if(idx>=DATA.length){
    document.getElementById('done').classList.add('show');
    document.getElementById('btnRow').style.display='none';
    document.getElementById('hint').style.display='none';
    document.getElementById('dkHint').style.display='none';
    document.getElementById('arena').style.display='none';
    document.getElementById('pbFill').style.width='100%';
    document.getElementById('pbText').textContent='Complete!';
    return;
  }

  document.getElementById('pbFill').style.width=(idx/DATA.length*100)+'%';
  document.getElementById('pbText').textContent=(idx+1)+' / '+DATA.length;

  card=mkCard(idx);
  arena.appendChild(card);
  attach(card);

  document.getElementById('cb1').style.display=idx+1<DATA.length?'block':'none';
  document.getElementById('cb2').style.display=idx+2<DATA.length?'block':'none';
}

function go(dir){
  if(!card||idx>=DATA.length)return;
  card.classList.add(dir==='left'?'exit-l':'exit-r');
  setTimeout(()=>{idx++;render();},300);
}

function attach(el){
  el.addEventListener('touchstart',ds,{passive:true});
  el.addEventListener('touchmove',dm,{passive:true});
  el.addEventListener('touchend',de,{passive:true});
  el.addEventListener('mousedown',ds);
  window.addEventListener('mousemove',dm);
  window.addEventListener('mouseup',de);
}

function cx(e){return e.touches?e.touches[0].clientX:e.clientX}

function ds(e){dragging=true;startX=cx(e);curX=0;if(card)card.style.transition='none';}
function dm(e){
  if(!dragging||!card)return;
  curX=cx(e)-startX;
  card.style.transform=`translateX(${curX}px) rotate(${curX*.055}deg)`;
  const r=Math.min(Math.abs(curX)/THRESH,1);
  card.querySelector('.ov-l').style.opacity=curX<-8?r:0;
  card.querySelector('.ov-r').style.opacity=curX>8?r:0;
}
function de(){
  if(!dragging||!card)return;
  dragging=false;
  window.removeEventListener('mousemove',dm);
  window.removeEventListener('mouseup',de);
  card.querySelector('.ov-l').style.opacity=0;
  card.querySelector('.ov-r').style.opacity=0;
  if(curX<-THRESH)go('left');
  else if(curX>THRESH)go('right');
  else{card.style.transition='transform .4s cubic-bezier(.34,1.56,.64,1)';card.style.transform='none';}
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')go('left');
  if(e.key==='ArrowRight')go('right');
});

function restart(){
  idx=0;
  document.getElementById('done').classList.remove('show');
  document.getElementById('btnRow').style.display='flex';
  document.getElementById('hint').style.display='block';
  document.getElementById('arena').style.display='flex';
  render();
}

render();
</script>
</body>
</html>
